name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate-marketplace:
    name: Validate Marketplace Manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON
        run: |
          jq empty .claude-plugin/marketplace.json || exit 1
          echo "✓ marketplace.json is valid JSON"

      - name: Validate Plugin JSONs
        run: |
          FOUND=0
          for file in plugins/*/hooks/hooks.json plugins/*/.claude-plugin/plugin.json plugins/*/.claude-plugin/.mcp.json; do
            if [ -f "$file" ]; then
              jq empty "$file" || exit 1
              echo "✓ $file is valid JSON"
              FOUND=$((FOUND + 1))
            fi
          done
          echo "Validated $FOUND JSON files"

  validate-flow:
    name: Validate Flow Plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Flow Commands
        run: |
          for cmd in plan generate-tasks implement autonomous cleanup summary review; do
            if [ -f "plugins/flow/commands/$cmd.md" ]; then
              echo "✓ flow:$cmd exists"
            else
              echo "✗ flow:$cmd missing"
              exit 1
            fi
          done

      - name: Check Flow Skills
        run: |
          for skill in plan generate-tasks implement autonomous cleanup review decision-engine; do
            if [ -f "plugins/flow/skills/$skill/SKILL.md" ]; then
              echo "✓ $skill skill exists"
            else
              echo "✗ $skill skill missing"
              exit 1
            fi
          done

  validate-semantic-memory:
    name: Validate Semantic Memory Plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/semantic-memory
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Type Check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm run build

      - name: Verify Build Output
        run: |
          if [ -f "dist/index.js" ]; then
            echo "✓ MCP server built successfully"
          else
            echo "✗ MCP server build failed"
            exit 1
          fi

  check-scripts:
    name: Check Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          if command -v shellcheck &>/dev/null; then
            echo "shellcheck already installed"
          elif sudo apt-get update && sudo apt-get install -y shellcheck 2>/dev/null; then
            echo "shellcheck installed via apt"
          else
            echo "::warning::Could not install shellcheck, checks will be skipped"
          fi
          shellcheck --version 2>/dev/null || true

      - name: Check Scripts
        run: |
          if ! command -v shellcheck &>/dev/null; then
            echo "::warning::shellcheck not installed, skipping checks"
            exit 0
          fi
          FAILED=0
          while IFS= read -r script; do
            if shellcheck "$script"; then
              echo "✓ $script passes ShellCheck"
            else
              echo "✗ $script failed ShellCheck"
              FAILED=1
            fi
          done < <(find . -name "*.sh" -type f -not -path "./node_modules/*" -not -path "./.git/*")
          exit $FAILED

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install Markdown Lint
        run: npm install -g markdownlint-cli

      - name: Lint Markdown Files
        run: |
          markdownlint '**/*.md' --ignore node_modules --ignore dist
          echo "✓ Markdown files linted"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Run pnpm audit
        working-directory: plugins/semantic-memory
        run: pnpm audit --audit-level moderate
        continue-on-error: true

  verify-structure:
    name: Verify Repository Structure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Required Files
        run: |
          required_files=(
            "README.md"
            "CHANGELOG.md"
            "LICENSE"
            ".claude-plugin/marketplace.json"
            ".gitignore"
            ".github/PULL_REQUEST_TEMPLATE.md"
          )

          for file in "${required_files[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ $file exists"
            else
              echo "✗ $file missing"
              exit 1
            fi
          done
